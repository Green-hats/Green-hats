<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Green hat</title>
  <desc id="desc">Student developer building useful things</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="0.55" stop-color="#312e81" />
      <stop offset="1" stop-color="#701a75" />
    </linearGradient>
    <radialGradient id="glow-a" cx="0" cy="0" r="1" gradientTransform="translate(215 80) rotate(35) scale(420 250)">
      <stop stop-color="#38bdf8" stop-opacity="0.42" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-b" cx="0" cy="0" r="1" gradientTransform="translate(1050 290) rotate(-145) scale(410 250)">
      <stop stop-color="#c084fc" stop-opacity="0.45" />
      <stop offset="1" stop-color="#c084fc" stop-opacity="0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#020617" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="320" rx="30" fill="url(#background)" />
  <rect width="1200" height="320" rx="30" fill="url(#glow-a)" />
  <rect width="1200" height="320" rx="30" fill="url(#glow-b)" />

  <g opacity="0.18" fill="none" stroke="#e0e7ff">
    <circle cx="90" cy="58" r="92" />
    <circle cx="1120" cy="252" r="116" />
    <path d="M0 254 C190 196 310 308 500 248 S850 186 1200 258" />
    <path d="M0 278 C180 222 338 324 515 270 S866 210 1200 281" />
  </g>

  <g filter="url(#shadow)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" text-anchor="middle">
    <text x="600" y="137" fill="#ffffff" font-size="64" font-weight="750" letter-spacing="8">GREEN HAT</text>
    <text x="600" y="184" fill="#c7d2fe" font-size="23" font-weight="500" letter-spacing="1.5">STUDENT DEVELOPER · BUILDING USEFUL THINGS</text>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="650" text-anchor="middle" letter-spacing="1">
    <g transform="translate(385 226)">
      <rect x="-92" y="-18" width="184" height="36" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16" />
      <text y="5" fill="#e0f2fe">DESKTOP TOOLS</text>
    </g>
    <g transform="translate(600 226)">
      <rect x="-92" y="-18" width="184" height="36" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16" />
      <text y="5" fill="#e0e7ff">AUTOMATION</text>
    </g>
    <g transform="translate(815 226)">
      <rect x="-92" y="-18" width="184" height="36" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.16" />
      <text y="5" fill="#f3e8ff">ROBOTICS</text>
    </g>
  </g>
</svg>
